<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FSD-X — Session Recaps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="vip-nav.js"></script>
  <style>body { background-color: #000; }</style>
</head>
<body class="text-white bg-black min-h-screen flex flex-col md:flex-row overflow-x-hidden antialiased">

  <header class="md:hidden w-full bg-zinc-950 border-b border-white/10 p-4 sticky top-0 z-50 flex items-center justify-between">
    <div class="text-2xl font-black tracking-wider text-green-400">FSD-X</div>
    <button onclick="toggleMobileMenu()" class="border border-white/10 bg-zinc-900 px-3 py-1.5 rounded text-xs tracking-wider hover:bg-zinc-800 transition">// MENU</button>
  </header>

  <aside id="sidebar-panel" class="w-64 fixed inset-y-0 left-0 bg-zinc-950 border-r border-white/10 flex flex-col justify-between p-6 z-50 overflow-y-auto transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
    <div id="nav-content" class="flex flex-col justify-between h-full"></div>
  </aside>

  <main class="flex-1 md:pl-64 w-full flex flex-col min-h-screen">

    <div id="loading-screen" class="flex-1 flex items-center justify-center">
      <div class="w-8 h-8 border-2 border-green-500/30 border-t-green-500 rounded-full animate-spin"></div>
    </div>

    <div id="page-content" class="hidden flex-1">

      <section class="pt-12 pb-10 md:pt-20 md:pb-12 px-6 md:px-12 border-b border-white/10 bg-gradient-to-b from-zinc-950 to-black">
        <div class="max-w-5xl mx-auto">
          <div class="text-green-400 uppercase tracking-[0.3em] text-[10px] font-bold mb-3">// VIP Members</div>
          <h1 class="text-3xl md:text-4xl font-black tracking-tight">Session Recaps</h1>
          <p class="mt-3 text-zinc-400 text-sm max-w-xl">Daily post-session breakdowns — grade, result, key levels, and lessons from each ORB session.</p>
          <div class="mt-5 flex flex-wrap gap-2">
            <button onclick="filterByGrade('')" class="filter-btn active px-3 py-1.5 bg-zinc-900 border border-green-500/40 text-green-400 rounded-lg text-xs font-bold transition" data-grade="">All</button>
            <button onclick="filterByGrade('A+')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 hover:border-green-500/30 text-zinc-400 hover:text-green-400 rounded-lg text-xs transition" data-grade="A+">A+</button>
            <button onclick="filterByGrade('A')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 hover:border-green-500/30 text-zinc-400 hover:text-green-400 rounded-lg text-xs transition" data-grade="A">A</button>
            <button onclick="filterByGrade('B+')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 hover:border-green-500/30 text-zinc-400 hover:text-green-400 rounded-lg text-xs transition" data-grade="B+">B+</button>
            <button onclick="filterByGrade('No Setup')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 hover:border-green-500/30 text-zinc-400 hover:text-green-400 rounded-lg text-xs transition" data-grade="No Setup">No Setup</button>
          </div>
        </div>
      </section>

      <section class="py-10 px-6 md:px-12">
        <div class="max-w-5xl mx-auto">
          <div id="recaps-container" class="space-y-4">
            <p class="text-zinc-600 text-sm">Loading recaps...</p>
          </div>
          <div id="empty-state" class="hidden text-center py-16">
            <div class="text-4xl mb-3">📋</div>
            <h3 class="text-lg font-black text-white mb-2">No recaps yet</h3>
            <p class="text-zinc-500 text-sm">Session recaps will appear here after each trading day.</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    const API = 'https://nexus-validator.dfuentes4211.workers.dev';
    let allRecaps = [];

    function toggleMobileMenu() {
      document.getElementById('sidebar-panel').classList.toggle('-translate-x-full');
    }

    const gradeColors = {
      'A+': 'bg-green-500/10 text-green-400 border-green-500/20',
      'A': 'bg-green-500/10 text-green-400 border-green-500/20',
      'B+': 'bg-zinc-800 text-zinc-300 border-white/10',
      'B': 'bg-zinc-800 text-zinc-300 border-white/10',
      'C+': 'bg-zinc-800 text-zinc-400 border-white/10',
      'C': 'bg-zinc-800 text-zinc-400 border-white/10',
      'No Setup': 'bg-zinc-900 text-zinc-500 border-white/5',
    };

    const resultColors = {
      'Win — TP1': 'text-green-400', 'Win — TP2': 'text-green-400', 'Win — Full': 'text-green-400',
      'Loss — SL': 'text-red-400', 'Scratch / BE': 'text-zinc-400', 'No Trade': 'text-zinc-500'
    };

    function renderRecaps(recaps) {
      const container = document.getElementById('recaps-container');
      const empty = document.getElementById('empty-state');

      if (!recaps.length) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      container.classList.remove('hidden');
      empty.classList.add('hidden');

      container.innerHTML = recaps.map(r => `
        <div class="border border-white/10 bg-zinc-950/40 rounded-2xl p-6 hover:border-white/20 transition">
          <div class="flex flex-wrap items-start justify-between gap-4 mb-4">
            <div>
              <div class="flex flex-wrap items-center gap-2 mb-1">
                <span class="text-xs text-zinc-500">${new Date(r.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</span>
                ${r.grade ? `<span class="px-2 py-0.5 rounded text-[10px] font-bold border ${gradeColors[r.grade] || 'bg-zinc-800 text-zinc-400 border-white/10'}">${r.grade}</span>` : ''}
              </div>
              <h3 class="text-base font-black text-white">${r.title}</h3>
            </div>
            ${r.result ? `<span class="text-sm font-bold ${resultColors[r.result] || 'text-zinc-400'} shrink-0">${r.result}</span>` : ''}
          </div>
          <p class="text-zinc-400 text-sm leading-relaxed mb-3">${r.summary}</p>
          ${r.notes ? `<div class="border-t border-white/5 pt-3 mt-3"><span class="text-[10px] text-zinc-600 uppercase tracking-wider block mb-1">Notes</span><p class="text-zinc-500 text-xs leading-relaxed">${r.notes}</p></div>` : ''}
          ${r.tags && r.tags.length ? `<div class="flex flex-wrap gap-1.5 mt-3">${r.tags.map(t => `<span class="px-2 py-0.5 bg-zinc-900 border border-white/5 rounded text-[10px] text-zinc-500">${t}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');
    }

    function filterByGrade(grade) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const isActive = btn.dataset.grade === grade;
        btn.classList.toggle('active', isActive);
        btn.classList.toggle('border-green-500/40', isActive);
        btn.classList.toggle('text-green-400', isActive);
        btn.classList.toggle('border-white/10', !isActive);
        btn.classList.toggle('text-zinc-400', !isActive);
      });
      const filtered = grade ? allRecaps.filter(r => r.grade === grade) : allRecaps;
      renderRecaps(filtered);
    }

    async function init() {
      const token = localStorage.getItem('fsdx_token');
      if (!token) { window.location.href = 'login.html'; return; }

      const meRes = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
      const me = await meRes.json();
      if (!me.authenticated) { window.location.href = 'login.html'; return; }

      const recapsRes = await fetch(`${API}/api/recaps`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await recapsRes.json();
      allRecaps = data.recaps || [];

      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('page-content').classList.remove('hidden');
      renderRecaps(allRecaps);

    loadVipNav({ activePage: 'recaps.html' });
    }

    init();
  </script>
</body>
</html>
