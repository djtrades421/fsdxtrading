<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FSD-X — Session Recaps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="nav-loader.js"></script>
  <style>
    body { background-color: #000; }
    .filter-btn.active { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.4); color: #22c55e; }
    .recap-card { transition: border-color 0.15s, transform 0.15s; }
    .recap-card:hover { border-color: rgba(255,255,255,0.15); }
    .chart-img { transition: opacity 0.2s; cursor: zoom-in; }
    .chart-img:hover { opacity: 0.9; }
    /* Lightbox */
    #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:100; align-items:center; justify-content:center; padding:24px; }
    #lightbox.open { display:flex; }
    #lightbox img { max-width:100%; max-height:90vh; border-radius:12px; border:1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="text-white bg-black min-h-screen flex flex-col md:flex-row overflow-x-hidden antialiased">

  <header class="md:hidden w-full bg-zinc-950 border-b border-white/10 p-4 sticky top-0 z-50 flex items-center justify-between">
    <div class="text-2xl font-black tracking-wider text-green-400">FSD-X</div>
    <button onclick="toggleMobileMenu()" class="border border-white/10 bg-zinc-900 px-3 py-1.5 rounded text-xs tracking-wider hover:bg-zinc-800 transition">// MENU</button>
  </header>

  <aside id="sidebar-panel" class="w-64 fixed inset-y-0 left-0 bg-zinc-950 border-r border-white/10 flex flex-col p-6 z-50 overflow-y-auto transform -translate-x-full md:translate-x-0 transition-transform duration-300">
    <div id="nav-content" class="flex flex-col justify-between h-full"></div>
  </aside>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Chart">
    <button onclick="closeLightbox()" style="position:absolute;top:16px;right:20px;color:rgba(255,255,255,0.5);font-size:24px;background:none;border:none;cursor:pointer;">✕</button>
  </div>

  <main class="flex-1 md:pl-64 w-full flex flex-col min-h-screen">

    <div id="loading-screen" class="flex-1 flex items-center justify-center">
      <div class="w-8 h-8 border-2 border-green-500/30 border-t-green-500 rounded-full animate-spin"></div>
    </div>

    <div id="page-content" class="hidden flex-1">

      <!-- Header -->
      <div class="border-b border-white/10 bg-zinc-950/60 px-6 md:px-10 pt-10 pb-0">
        <div class="max-w-5xl mx-auto">
          <div class="text-green-400 uppercase tracking-[0.3em] text-[10px] font-bold mb-2">// VIP Members</div>
          <h1 class="text-3xl font-black tracking-tight mb-1">Session Recaps</h1>
          <p class="text-zinc-500 text-sm mb-5">Daily post-session breakdowns — grade, result, key levels, and lessons from each ORB session.</p>

          <!-- Filters -->
          <div class="flex flex-wrap gap-2 pb-5">
            <button onclick="filterBy('grade','')" class="filter-btn active px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="">All Grades</button>
            <button onclick="filterBy('grade','A+')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="A+">A+</button>
            <button onclick="filterBy('grade','A')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="A">A</button>
            <button onclick="filterBy('grade','B+')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="B+">B+</button>
            <button onclick="filterBy('grade','B')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="B">B</button>
            <button onclick="filterBy('grade','C+')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="C+">C+</button>
            <button onclick="filterBy('grade','C')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="C">C</button>
            <button onclick="filterBy('grade','D')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="grade" data-val="D">D</button>
            <div class="w-px bg-white/10 mx-1 self-stretch"></div>
            <button onclick="filterBy('result','')" class="filter-btn active px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="result" data-val="">All Results</button>
            <button onclick="filterBy('result','Win')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="result" data-val="Win">Wins</button>
            <button onclick="filterBy('result','Loss')" class="filter-btn px-3 py-1.5 bg-zinc-900 border border-white/10 text-zinc-400 rounded-lg text-xs font-bold transition" data-filter="result" data-val="Loss">Losses</button>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="flex-1 px-6 md:px-10 py-8">
        <div class="max-w-5xl mx-auto">
          <div id="recaps-count" class="text-xs text-zinc-600 mb-4"></div>
          <div id="recaps-container" class="space-y-4"></div>
          <div id="empty-state" class="hidden text-center py-20">
            <div class="text-4xl mb-3">📋</div>
            <h3 class="text-lg font-black mb-2">No recaps yet</h3>
            <p class="text-zinc-500 text-sm">Session recaps will appear here after each trading day.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API = 'https://nexus-validator.dfuentes4211.workers.dev';
    let allRecaps = [];
    let activeGradeFilter = '';
    let activeResultFilter = '';

    function toggleMobileMenu() { document.getElementById('sidebar-panel').classList.toggle('-translate-x-full'); }

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

    const gradeColor = g => {
      if (['A+','A'].includes(g)) return 'bg-green-500/10 text-green-400 border-green-500/25';
      if (['B+','B'].includes(g)) return 'bg-blue-500/10 text-blue-400 border-blue-500/25';
      if (['C+','C'].includes(g)) return 'bg-yellow-500/10 text-yellow-400 border-yellow-500/25';
      if (g === 'D') return 'bg-red-500/10 text-red-400 border-red-500/25';
      return 'bg-zinc-800 text-zinc-400 border-white/10';
    };

    const resultColor = r => {
      if (!r) return 'text-zinc-500';
      const rl = r.toLowerCase();
      if (rl.includes('win')) return 'text-green-400';
      if (rl.includes('loss')) return 'text-red-400';
      if (rl.includes('be') || rl.includes('scratch')) return 'text-yellow-400';
      return 'text-zinc-400';
    };

    const resultBg = r => {
      if (!r) return 'bg-zinc-900 border-white/5';
      const rl = r.toLowerCase();
      if (rl.includes('win')) return 'bg-green-500/10 border-green-500/20';
      if (rl.includes('loss')) return 'bg-red-500/10 border-red-500/20';
      return 'bg-zinc-800 border-white/10';
    };

    function renderRecaps(recaps) {
      const container = document.getElementById('recaps-container');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('recaps-count');

      if (!recaps.length) {
        container.innerHTML = '';
        empty.classList.remove('hidden');
        count.textContent = '';
        return;
      }

      empty.classList.add('hidden');
      count.textContent = recaps.length + ' recap' + (recaps.length !== 1 ? 's' : '');

      container.innerHTML = recaps.map(r => {
        const dateStr = r.date ? new Date(r.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) : '';
        const tags = Array.isArray(r.tags) ? r.tags : (r.tags ? r.tags.split(',').map(t=>t.trim()).filter(Boolean) : []);

        const chartBlock = r.chartUrl ? `
          <div class="mt-3 pt-3 border-t border-white/5">
            <a href="${r.chartUrl}" target="_blank" class="text-green-400 hover:text-green-300 text-xs font-bold transition">View Chart ↗</a>
          </div>` : '';

        return `
        <div class="recap-card border border-white/10 bg-zinc-950/40 rounded-2xl overflow-hidden">
          <!-- Card header -->
          <div class="px-6 pt-5 pb-4">
            <div class="flex items-start justify-between gap-4 mb-3">
              <div class="flex-1">
                <div class="flex flex-wrap items-center gap-2 mb-1.5">
                  <span class="text-xs text-zinc-500 font-medium">${dateStr}</span>
                  ${r.grade ? `<span class="px-2 py-0.5 rounded text-[10px] font-black border ${gradeColor(r.grade)}">${r.grade}</span>` : ''}
                  ${r.result ? `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold border ${resultBg(r.result)} ${resultColor(r.result)}">${r.result}</span>` : ''}
                </div>
                <h3 class="text-base font-black text-white leading-snug">${r.title}</h3>
              </div>
            </div>

            <p class="text-zinc-400 text-sm leading-relaxed">${r.summary}</p>

            ${r.notes ? `
            <div class="mt-3 border-l-2 border-white/10 pl-3">
              <div class="text-[10px] text-zinc-600 uppercase tracking-wider mb-1 font-bold">Notes</div>
              <p class="text-zinc-500 text-xs leading-relaxed italic">${r.notes}</p>
            </div>` : ''}

            ${tags.length ? `
            <div class="flex flex-wrap gap-1.5 mt-3">
              ${tags.map(t => `<span class="px-2 py-0.5 bg-zinc-900 border border-white/[0.06] rounded-full text-[10px] text-zinc-500">${t}</span>`).join('')}
            </div>` : ''}

            ${chartBlock}
          </div>
        </div>`;
      }).join('');
    }

    function filterBy(type, val) {
      if (type === 'grade') activeGradeFilter = val;
      if (type === 'result') activeResultFilter = val;

      // Update button states per group
      document.querySelectorAll(`.filter-btn[data-filter="${type}"]`).forEach(btn => {
        const isActive = btn.dataset.val === val;
        btn.classList.toggle('active', isActive);
      });

      const filtered = allRecaps.filter(r => {
        const gradeOk = !activeGradeFilter || r.grade === activeGradeFilter;
        const resultOk = !activeResultFilter || (r.result && r.result.toLowerCase().includes(activeResultFilter.toLowerCase()));
        return gradeOk && resultOk;
      });
      renderRecaps(filtered);
    }

    async function init() {
      const token = localStorage.getItem('fsdx_token');
      if (!token) { window.location.href = 'login.html'; return; }
      try {
        const res = await fetch(`${API}/api/recaps`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) {
          const data = await res.json();
          allRecaps = data.recaps || [];
        }
      } catch (err) {
        console.log('Could not load recaps');
      }
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('page-content').classList.remove('hidden');
      renderRecaps(allRecaps);
    }

    init();
  </script>
</body>
</html>
